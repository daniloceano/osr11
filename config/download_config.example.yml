# Example download configuration for OSR11 compound flooding project
# Copy to download_config.yml and adjust as needed.
# This file is safe to commit. Never put credentials here.

# Spatial bounding box [lon_min, lat_min, lon_max, lat_max]
# Default: South Atlantic Eastern Coast of Brazil (test subset)
bbox:
  lon_min: -50.0
  lon_max: -40.0
  lat_min: -30.0
  lat_max: -20.0

# Time period for download
period:
  start: "1993-01-01"
  end:   "1993-03-31"

# Output directory (relative to project root)
output_dir: "data/raw"

# CMEMS product configuration
# NOTE: variable names and dataset_id are resolved programmatically
# at runtime from the CMEMS catalog. The product IDs below are the
# stable product identifiers; the script will inspect the catalog
# to find the correct dataset_id and variable names within each product.

# Parallel download settings (used by download_cmems_parallel.py)
parallel:
  max_workers: 4  # concurrent monthly downloads per product

glorys:
  product_id: "GLOBAL_MULTIYEAR_PHY_001_030"
  # dataset_id verified from catalog on 2026-03-18.
  # Use daily (P1D) for temporal analysis of extremes.
  # Other available: P1M-m (monthly), 0.083deg-climatology_P1M-m (climatology)
  dataset_id: "cmems_mod_glo_phy_my_0.083deg_P1D-m"
  # Variable verified from catalog: zos = sea_surface_height_above_geoid
  variables: ["zos"]

waverys:
  product_id: "GLOBAL_MULTIYEAR_WAV_001_032"
  # dataset_id verified from catalog on 2026-03-18.
  # PT3H-i is the 3-hourly instantaneous analysis dataset (main product).
  # Other available: 0.2deg-climatology_P1M-m (climatology only, no VHM0_SW*/VMDR)
  dataset_id: "cmems_mod_glo_wav_my_0.2deg_PT3H-i"
  # Variables verified from catalog:
  #   VHM0   = sea_surface_wave_significant_height (total Hs)
  #   VMDR   = sea_surface_wave_from_direction
  variables: ["VHM0", "VMDR"]
