name: osr11
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - netcdf4
  - xarray
  - numpy
  - pyyaml
  - matplotlib
  - pandas
  - scipy
  - openpyxl       # .xlsx reading (reported events spreadsheet)
  - cartopy        # geographic maps (PlateCarree, NaturalEarth features)
  - pip:
      - copernicusmarine>=2.0
      # MagicA: extreme value analysis (POT, block maxima, return periods)
      # Must be installed from GitHub (not on PyPI):
      #   pip install git+https://github.com/daniloceano/MagicA.git
      - magica @ git+https://github.com/daniloceano/MagicA.git
